name: Autonomous PR follow-up

on:
  pull_request_review:
    types: [submitted]
  issue_comment:
    types: [created]
  check_suite:
    types: [completed]

permissions:
  contents: write
  pull-requests: write
  id-token: write

concurrency:
  group: autonomous-pr-followup-${{ github.event.pull_request.number || github.event.issue.number || github.event.check_suite.head_branch }}
  cancel-in-progress: true

jobs:
  followup:
    # On a public repo, anyone can leave a PR comment or review, even without write access —
    # this is the classic "pwn request" surface for privileged workflows triggered by
    # issue_comment/pull_request_review. Only let a comment/review from someone with write
    # access reach the checkout-and-execute steps below (check_suite has no such actor, so
    # it isn't gated here — it's already restricted by the same-repo + branch-prefix checks
    # inside the "Resolve target PR" step).
    if: >
      (github.event_name != 'issue_comment' ||
       contains(fromJSON('["OWNER", "COLLABORATOR", "MEMBER"]'), github.event.comment.author_association)) &&
      (github.event_name != 'pull_request_review' ||
       contains(fromJSON('["OWNER", "COLLABORATOR", "MEMBER"]'), github.event.review.author_association))
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Resolve target PR
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EVENT_NAME: ${{ github.event_name }}
          REVIEW_PR_NUMBER: ${{ github.event.pull_request.number }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_IS_PR: ${{ github.event.issue.pull_request.url }}
          CHECK_SUITE_CONCLUSION: ${{ github.event.check_suite.conclusion }}
          CHECK_SUITE_BRANCH: ${{ github.event.check_suite.head_branch }}
        run: |
          # All untrusted github.event.* values arrive via env vars above, never spliced
          # directly into this script, so a crafted branch/comment/etc. can't inject shell.
          case "$EVENT_NAME" in
            pull_request_review)
              number="$REVIEW_PR_NUMBER"
              ;;
            issue_comment)
              if [ -z "$ISSUE_IS_PR" ]; then
                echo "Not a PR comment, skipping."
                echo "skip=true" >> "$GITHUB_OUTPUT"
                exit 0
              fi
              number="$ISSUE_NUMBER"
              ;;
            check_suite)
              if [ "$CHECK_SUITE_CONCLUSION" != "failure" ]; then
                echo "Check suite did not fail, nothing to do."
                echo "skip=true" >> "$GITHUB_OUTPUT"
                exit 0
              fi
              number=$(gh pr list --head "$CHECK_SUITE_BRANCH" --state open --json number --jq '.[0].number // empty')
              if [ -z "$number" ]; then
                echo "No open PR for this branch, skipping."
                echo "skip=true" >> "$GITHUB_OUTPUT"
                exit 0
              fi
              ;;
          esac

          # Re-resolve the branch (and whether it's a same-repo branch) from the GitHub API
          # rather than trusting event payload fields: pull_request_review/issue_comment/
          # check_suite can all fire for PRs opened from a fork, and a fork branch can be
          # named anything, including something that *looks* like claude/auto-*. Only ever
          # check out a branch that actually lives in this repository, not a fork.
          pr_json=$(gh pr view "$number" --json headRefName,headRefOid,isCrossRepository)
          branch=$(jq -r '.headRefName' <<<"$pr_json")
          sha=$(jq -r '.headRefOid' <<<"$pr_json")
          is_cross_repo=$(jq -r '.isCrossRepository' <<<"$pr_json")

          if [ "$is_cross_repo" = "true" ]; then
            echo "PR head is in a fork, not this repository — refusing to check it out. Skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ "$branch" != claude/auto-* ]]; then
            echo "Not an autonomous-maintenance PR (branch: $branch), skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "number=$number" >> "$GITHUB_OUTPUT"
          echo "branch=$branch" >> "$GITHUB_OUTPUT"
          echo "sha=$sha" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v7
        if: steps.pr.outputs.skip != 'true'
        with:
          # Pin to the exact commit resolved above, not the branch name: the branch is
          # mutable, so re-resolving "the current tip of claude/auto-*" at checkout time
          # would reopen a TOCTOU window between the authorization check above and the
          # code we actually run — someone could push different content to the branch in
          # between. A SHA is immutable, so this checks out exactly what was authorized.
          ref: ${{ steps.pr.outputs.sha }}
          fetch-depth: 0

      - name: Enable Corepack
        if: steps.pr.outputs.skip != 'true'
        run: corepack enable

      - name: Set up Node
        if: steps.pr.outputs.skip != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn

      - name: Address feedback / fix CI on the PR
        if: steps.pr.outputs.skip != 'true'
        uses: anthropics/claude-code-action@v1
        env:
          GH_TOKEN: ${{ secrets.GH_AUTOMATION_PAT }}
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GH_AUTOMATION_PAT }}
          claude_args: |
            --max-turns 30
            --allowedTools "Read,Edit,Write,Glob,Grep,Bash(yarn:*),Bash(git:*),Bash(gh pr view:*),Bash(gh pr diff:*)"
          settings: |
            {
              "permissions": {
                "deny": [
                  "Edit(.github/workflows/ci.yml)",
                  "Write(.github/workflows/ci.yml)",
                  "Edit(.github/workflows/deploy.yml)",
                  "Write(.github/workflows/deploy.yml)",
                  "Edit(.github/workflows/dependabot-lockfile.yml)",
                  "Write(.github/workflows/dependabot-lockfile.yml)",
                  "Edit(.github/workflows/autonomous-maintenance.yml)",
                  "Write(.github/workflows/autonomous-maintenance.yml)",
                  "Edit(.github/workflows/pr-auto-merge.yml)",
                  "Write(.github/workflows/pr-auto-merge.yml)"
                ]
              }
            }
          prompt: |
            You are following up, unattended, on PR #${{ steps.pr.outputs.number }}
            (branch ${{ steps.pr.outputs.branch }}) in ${{ github.repository }}. This PR was opened by
            the autonomous maintenance workflow, and this run was triggered by new review activity, a
            new comment, or a failing check on it. Your turn budget is capped
            (--max-turns 30; every tool call counts as a turn) — work efficiently.

            Read CLAUDE.md first and follow it exactly.

            Use `gh pr view ${{ steps.pr.outputs.number }} --comments` and
            `gh pr view ${{ steps.pr.outputs.number }} --json reviews` (or equivalent) to see the
            latest review comments, and check recent CI runs, to figure out what actually needs
            fixing right now.

            - If there's actionable review feedback (human or bot — Copilot, Codex, etc.), address
              it directly if you're confident, matching CLAUDE.md's Pull requests section.
            - If CI is failing, fix the real underlying cause.
            - The checkout is pinned to a specific commit, so you're on a detached HEAD. Before
              committing, run `git checkout -B ${{ steps.pr.outputs.branch }}` to attach to the real
              branch, then commit and push normally to the EXISTING branch
              (${{ steps.pr.outputs.branch }}) — never create a new branch or a new PR for this. If
              the push is rejected as non-fast-forward, someone else changed the branch since this
              run started — stop rather than force-pushing over it.
            - Never use `--no-verify`, never skip or delete a failing test to make it pass, never
              disable a check to route around it — fixes must be genuine.
            - Never force-push, never push to main, never modify anything under .github/workflows/.
            - Run `yarn test` (and `yarn build` if relevant) and confirm it is green before pushing.
            - If a change touches anything CLAUDE.md documents, update CLAUDE.md in the same commit.
            - Never merge or approve this PR yourself.

            If nothing here is actually actionable (e.g. a comment is just a question, or CI is
            already green), make no changes.
