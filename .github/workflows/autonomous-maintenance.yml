name: Autonomous maintenance

on:
  schedule:
    - cron: "0 */5 * * *"
  workflow_dispatch:

concurrency:
  group: autonomous-maintenance
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write

jobs:
  maintenance:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Check open autonomous PRs and task backlog
        id: guard
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Don't block on *any* open autonomous PR — only skip once every task slot is
          # taken (a hard safety net against runaway PR count). Otherwise pass the list of
          # currently-open autonomous PRs to the prompt so Claude can avoid opening a
          # second PR for the same task while still opening a separate PR for a genuinely
          # independent one.
          open_prs=$(gh pr list --state open --json headRefName,title \
            --jq '[.[] | select(.headRefName | startswith("claude/auto-"))]')
          count=$(jq 'length' <<<"$open_prs")

          summary=$(jq -r '.[] | "- \(.headRefName): \(.title)"' <<<"$open_prs")
          {
            echo "open_prs<<PR_EOF"
            echo "$summary"
            echo "PR_EOF"
          } >> "$GITHUB_OUTPUT"

          # Phase 0 check: is the latest push to main currently red? This is the top-priority
          # condition (see prompt below) and, unlike Phase A/B, is allowed to bypass the 5-PR
          # ceiling — a broken main blocks every other PR's merge via the required `test`
          # check, so healing it is never redundant with an already-open PR.
          main_ci=$(gh run list --workflow=ci.yml --branch=main --status=completed --limit=1 \
            --json conclusion,url,headSha)
          main_ci_conclusion=$(jq -r '.[0].conclusion // "unknown"' <<<"$main_ci")
          main_ci_url=$(jq -r '.[0].url // ""' <<<"$main_ci")
          if [ "$main_ci_conclusion" = "failure" ]; then
            echo "main_ci_broken=true" >> "$GITHUB_OUTPUT"
          else
            echo "main_ci_broken=false" >> "$GITHUB_OUTPUT"
          fi
          echo "main_ci_run_url=$main_ci_url" >> "$GITHUB_OUTPUT"

          # Phase 0 check: open PRs with a failing check, excluding claude/auto-* (already
          # owned by autonomous-pr-followup.yml's webhook-driven fixes) and fork PRs (never
          # ours to touch). In practice this mostly surfaces Dependabot PRs that have gone
          # stale against main and nothing currently re-syncs them.
          failing_prs=$(gh pr list --state open \
            --json number,headRefName,title,isCrossRepository,statusCheckRollup \
            --jq '[.[] | select(.isCrossRepository == false)
                        | select(.headRefName | startswith("claude/auto-") | not)
                        | select([.statusCheckRollup[]?.conclusion] | any(. == "FAILURE"))]
                  | .[] | "- #\(.number) (\(.headRefName)): \(.title)"')
          {
            echo "failing_prs<<FAIL_EOF"
            echo "$failing_prs"
            echo "FAIL_EOF"
          } >> "$GITHUB_OUTPUT"

          if [ "$count" -ge 5 ] && [ "$main_ci_conclusion" != "failure" ]; then
            echo "5 autonomous PRs already open (one per task slot) — skipping this run."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

          # Fetch the human-curated task backlog: open issues labeled claude-task. These
          # take priority over the built-in maintenance menu — the prompt gets the list
          # (number + title) and reads the chosen issue's full spec with `gh issue view`.
          # Issues also labeled `blocked` are excluded: a previous run already established
          # they can't be done unattended — either an environment/permission blocker, or (see
          # the prompt's comment-history check below) a confirmed repeat: two consecutive
          # runs independently concluded the issue can't be implemented as written (e.g. a
          # stale spec targeting a mechanism the codebase no longer has) with nothing new in
          # between. Either way, re-attempting every 5 hours just burns quota re-deriving the
          # same conclusion — a human unblocks (after closing, rewriting, or otherwise
          # resolving the issue) and removes the label to make it eligible again.
          open_tasks=$(gh issue list --label claude-task --state open \
            --json number,title,labels \
            --jq '.[] | select([.labels[].name] | index("blocked") | not)
                      | "- #\(.number): \(.title)"')
          {
            echo "open_tasks<<TASK_EOF"
            echo "$open_tasks"
            echo "TASK_EOF"
          } >> "$GITHUB_OUTPUT"

          # Separately surface already-open gap-analysis proposals, so the Phase B gap
          # analysis task can skip re-proposing something already in the backlog above.
          open_gap_issues=$(gh issue list --label gap-analysis --state open \
            --json number,title --jq '.[] | "- #\(.number): \(.title)"')
          {
            echo "open_gap_issues<<GAP_EOF"
            echo "$open_gap_issues"
            echo "GAP_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Enable Corepack
        if: steps.guard.outputs.skip != 'true'
        run: corepack enable

      - name: Set up Node
        if: steps.guard.outputs.skip != 'true'
        uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: yarn

      - name: Run autonomous maintenance task
        id: claude
        if: steps.guard.outputs.skip != 'true'
        # Tolerated-failure handling: the step below re-fails the job for any real error,
        # but downgrades a pure Claude usage-quota exhaustion (HTTP 429 on turn 1) to a
        # warning — the run did no work and the next scheduled run simply retries, so a
        # red X adds alert noise without any actionable signal.
        continue-on-error: true
        uses: anthropics/claude-code-action@v1
        env:
          GH_TOKEN: ${{ secrets.GH_AUTOMATION_PAT }}
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GH_AUTOMATION_PAT }}
          base_branch: main
          branch_prefix: claude/auto-
          # This repo is public, so the run's logs are public either way; the transcript is
          # the only way to see WHY an unattended run ended without producing anything.
          show_full_output: true
          claude_args: |
            --allowedTools "Read,Edit,Write,Glob,Grep,Bash(yarn:*),Bash(git:*),Bash(gh pr create:*),Bash(gh pr list:*),Bash(gh pr view:*),Bash(gh pr comment:*),Bash(gh run list:*),Bash(gh run view:*),Bash(gh issue list:*),Bash(gh issue view:*),Bash(gh issue comment:*),Bash(gh issue create:*),Bash(gh issue edit:*),Bash(gh label create:*),Bash(gh api repos/*/milestones:*)"
          settings: |
            {
              "permissions": {
                "deny": [
                  "Edit(.github/workflows/ci.yml)",
                  "Write(.github/workflows/ci.yml)",
                  "Edit(.github/workflows/deploy.yml)",
                  "Write(.github/workflows/deploy.yml)",
                  "Edit(.github/workflows/autonomous-pr-followup.yml)",
                  "Write(.github/workflows/autonomous-pr-followup.yml)",
                  "Edit(.github/workflows/pr-auto-merge.yml)",
                  "Write(.github/workflows/pr-auto-merge.yml)"
                ]
              }
            }
          prompt: |
            You are running as a scheduled, unattended maintenance job on this repository
            (REPO: ${{ github.repository }}). Nobody is watching this run, so only make changes
            you are confident are safe, small, and correct. There is no fixed turn-count cap on this
            run. Instead, before picking or sizing a task below, estimate how much of the current
            rolling 5-hour Claude usage window is likely still available and aim to keep this run's
            planned work at or under roughly 50% of a full window's worth of effort — every tool call
            counts as a turn, so use elapsed turns/time so far in the run as your practical signal
            once you're underway. This is a self-estimated heuristic, not a metered value: you have no
            visibility into how much of the window autonomous-pr-followup.yml or interactive usage may
            already be consuming concurrently. 50% is a soft aim, not a hard stop — its margin exists
            to absorb both that estimation inaccuracy and unknown concurrent usage, so modestly
            overshooting it because a task turned out bigger than expected is fine, not a failure to
            avoid at all costs. Work efficiently regardless: avoid redundant reads and re-checks.

            Read CLAUDE.md first — it documents this repo's architecture, conventions, and testing
            setup, and you must follow it exactly.

            Currently-open autonomous PRs (branch: title):
            ${{ steps.guard.outputs.open_prs || '(none)' }}

            Open task backlog (issues labeled claude-task, curated by the maintainer in planning
            sessions):
            ${{ steps.guard.outputs.open_tasks || '(none)' }}

            Currently-open gap-analysis proposals (number: title), filed by a previous run's gap
            analysis task (see Phase B item 6):
            ${{ steps.guard.outputs.open_gap_issues || '(none)' }}

            Main branch CI status: the latest completed run of ci.yml on main
            ${{ steps.guard.outputs.main_ci_broken == 'true' && format('FAILED: {0}', steps.guard.outputs.main_ci_run_url) || 'is green.' }}

            Open PRs with a failing check (excludes claude/auto-* branches, which
            autonomous-pr-followup.yml already owns, and fork PRs):
            ${{ steps.guard.outputs.failing_prs || '(none)' }}

            This is a side project — time is not a constraint (one task every 5 hours is fine), but
            your self-estimated usage-window budget per run is (see above). Before you start
            implementing whatever task you pick below, roughly size it against that budget, reserving
            a buffer of roughly the last 15-20% of it for test + commit + push + PR-open overhead, so
            you don't run out mid-work. If a task looks too large to land safely within that budget
            even after buffering:
            - For a Phase A task issue, implement the largest coherent, independently-valuable,
              test-covered SLICE of the spec first — see the `Part of #<number>` guidance in Phase A
              below, instead of abandoning the task or attempting the whole thing at once.
            - For a Phase B menu task, scope this run to one coherent sub-area (e.g. one file, one
              specific gap) rather than trying to cover everything the item could mean at once, and
              leave the rest for a future run to pick up under the same menu item.

            Either way, don't wait until everything is finished to create visible progress: open the
            PR as soon as there's a meaningful, buildable, test-passing first commit rather than only
            at the very end, and push each subsequent meaningful commit as you make it rather than
            batching every commit into one push at the end. If the run is ever cut short by the usage
            budget, whatever has already landed then stays as real, discoverable progress on a real
            PR instead of being lost with the ephemeral runner.

            You do exactly ONE unit of work per run, chosen in three phases. A CI/CD failure
            (Phase 0) always outranks the task backlog (Phase A), which always outranks the
            maintenance menu (Phase B) — check them in that order and stop at the first one that
            applies.

            PHASE 0 — CI/CD failures (highest priority; skip straight past Phase A/B if this
            applies, even if the 5-PR ceiling below would otherwise skip the run entirely). A
            failing CI check blocks every other PR from merging via the required `test` check and
            erodes trust in the automation, so treat it as more urgent than any feature or
            maintenance work:
            - (a) If "Main branch CI status" above says FAILED, that is the single highest
              priority thing to do this run, full stop — do not also attempt Phase A or B. Open
              the failing run with `gh run view <run-id> --log-failed` (parse the run id from the
              URL) to find the actual error, create a branch named
              `claude/heal-main-<short-slug>` off the latest main, make the smallest correct fix
              that gets `yarn test` (and `yarn build` if the failure is build-related) green again,
              push it, and open a PR with `gh pr create` explaining what broke and why the fix
              addresses it. Do not merge it yourself. This branch prefix is already recognized by
              pr-auto-merge.yml's low-risk auto-merge path, so a small fix can merge without
              waiting for a human or for your next run.
            - (b) Otherwise, if "Open PRs with a failing check" above is non-empty, pick one (most
              valuable first) and unblock it:
              - For a Dependabot PR (branch starts with `dependabot/`): these usually fail because
                the branch has gone stale against main (e.g. it predates a source change the PR's
                own copy of the tests doesn't know about yet), not because of the dependency bump
                itself. Confirm with `gh pr view <number> --json mergeStateStatus` — if it shows
                the branch is behind, request a rebase by commenting exactly `@dependabot rebase`
                via `gh pr comment <number> --body '@dependabot rebase'`. Check
                `gh pr view <number> --json comments` first and skip this PR if that comment is
                already there from a previous run (rebase runs asynchronously; don't re-request or
                push your own commits to a `dependabot/*` branch). If the branch is NOT behind
                main, the failure is a real issue with the bump itself — leave it for a human, do
                not attempt a code fix.
              - For any other non-`claude/auto-*` PR, only act if you can identify a genuine,
                small, confidently-correct fix; otherwise leave it for a human rather than guessing.
              - After handling one PR this way, end the run — do not also attempt Phase A or B.
            - (c) If neither (a) nor (b) applies (main is green and the failing-PR list is empty),
              fall through to Phase A.

            PHASE A — task backlog next. If the backlog above is non-empty, pick the top
            eligible task issue and implement it:
            - Eligible means: no open autonomous PR above already covers it (its issue number
              appears in a branch name like claude/auto-task-<number>-* or in a PR title), and it
              is not blocked — if the issue body says "Blocked by #N", check #N with
              `gh issue view N` and skip this task while #N is still open. (Issues labeled
              `blocked` — either an environment/permission blocker, or a task issue where a
              second consecutive run confirmed it can't be implemented as written, see the
              comment-history check below — are excluded from the backlog list above before you
              ever see it.)
            - Order: issues labeled priority:high first, then lowest issue number (FIFO).
            - Read the full spec with `gh issue view <number>`. Implement exactly what it says —
              its acceptance criteria are the definition of done, its "Out of scope" section is
              binding, and its "Verification" steps must be run in addition to `yarn test`.
            - Before investigating, check this issue's own history for a prior automated
              investigation you'd otherwise just repeat: `gh issue view <number> --json comments
              --jq '.comments[-3:] | .[] | "\(.author.login) @ \(.createdAt):\n\(.body)"'`. If the
              most recent comment(s) already reached a "not implementable as currently written"
              conclusion (stale/superseded spec, unresolvable ambiguity, etc.) — and nothing has
              changed since that would justify re-deriving it (no maintainer reply or issue-body
              edit after that comment, and no code change to the mechanism/files that comment
              discusses) — do not redo the full investigation from scratch. If this issue already
              has at least ONE prior comment reaching that same conclusion under those conditions,
              this run's independent look is a confirmed repeat: leave one short comment pointing
              at the earlier analysis instead of re-deriving pages of reasoning, and apply the
              `blocked` label immediately (see the label instructions below — the same label and
              exclusion mechanism now applies to this case too, not just environment/permission
              blockers), so a third run never re-hits the same wall. If this is the first time you
              are reaching this conclusion (no qualifying prior comment), proceed normally per the
              paragraph below — comment-only, no label yet, giving a human one full cycle to catch
              it before automation locks it out.
            - Name the branch `claude/auto-task-<number>-<short-slug>` (the issue number in the
              branch name is how future runs know this task is already in flight).
            - The PR body MUST include the line `Closes #<number>` so merging auto-closes the task —
              UNLESS this PR is a partial slice per the budget guidance above, in which case use
              `Part of #<number>` instead (no auto-close) and leave a `gh issue comment` on the task
              issue summarizing exactly what this slice covers and what remains, so a future run can
              pick up the rest (the issue stays open and eligible; only the PR that completes the
              full spec includes `Closes #<number>`).
            - If the chosen task turns out infeasible for reasons other than size (ambiguous spec,
              can't get tests green after a reasonable attempt), do NOT half-land it or fall through
              to another task: leave a comment on the issue with `gh issue comment` explaining
              exactly what's blocking, make no changes, and end the run without a PR. If the
              blocker is an environment/permission restriction of this unattended session itself
              (e.g. a Write the harness refuses to grant, like new files under .claude/), ALSO
              label the issue so future runs stop re-attempting it and burning their budget on the
              same wall: `gh label create blocked --color d93f0b --description "Infeasible for
              unattended runs until a human unblocks it" --force`, then
              `gh issue edit <number> --add-label blocked`. A human removes the label once
              unblocked. Do not apply the label on an ordinary spec/test problem's FIRST occurrence
              — stay comment-only initially, since a human may resolve it (close, rewrite, edit)
              before automation needs to step in. But per the comment-history check above, if this
              run's conclusion duplicates a prior comment's "infeasible as written" finding with
              nothing new in between, that's no longer a first occurrence — apply the `blocked`
              label right then, on this same run, rather than leaving it comment-only again and
              waiting for a third or later run to notice the pattern.

            PHASE B — maintenance menu fallback. Only if Phase 0 doesn't apply and there is NO
            eligible task issue in Phase A, pick exactly one of the following menu tasks —
            whichever is most valuable given the current state of the repo. Minimise PRs for
            similar work: if one of the open
            PRs above already covers the same task/purpose you were about to pursue (e.g. another
            test-coverage PR while a test-coverage PR is already open), don't open a duplicate —
            either pick a different, genuinely independent task from the menu instead, or if every
            applicable task already has a matching open PR, make no changes this run. Conversely,
            do open a separate PR for a task that's genuinely independent of what's already open
            (e.g. a dependency bump alongside an already-open docs-sync PR) — the goal is avoiding
            redundant PRs, not minimising the total PR count.

            1. Test coverage gaps — find untested branches or edge cases in src/game/engine.js,
               src/game/layers.js, or src/game/storage.js and add tests for them.
            2. Dependency & security maintenance — run `yarn audit`, and if there are safe patch or
               minor version bumps available, apply them via `yarn install` (respecting yarn.lock,
               Yarn Classic v1 format) and confirm nothing breaks.
            3. Code quality / simplification — look for dead code, duplicated logic, or drift from
               CLAUDE.md's documented three-layer architecture (engine.js / useIncrementalGame.js /
               MainPage) and fix it.
            4. CLAUDE.md documentation sync — compare CLAUDE.md's documented function signatures,
               constants, state shape, and test counts against the real source, and correct any
               drift you find.
            5. Workflow self-improvement — review this task menu and this workflow file
               (.github/workflows/autonomous-maintenance.yml) itself: tighten a task description,
               add a new low-risk task type, or retire one that repeatedly finds nothing to do. You
               may edit ONLY .github/workflows/autonomous-maintenance.yml for this task — no other
               file under .github/workflows/. You must NOT weaken or remove, even in the name of
               "improving" it: the duplicate-PR guard step, the self-estimated usage-window budgeting
               instructions (the ~50%-of-window soft target and its self-scoping fallback behavior),
               the settings.permissions.deny list protecting the other workflow files, the requirement
               that you never merge your own PR, the requirement to always open a PR for human
               review instead of pushing straight to main, or the rule that the Phase A task
               backlog always takes priority over this menu.
            6. Gap analysis — survey the repo for a gap not already covered by an open issue or PR:
               a missing test, stale or missing documentation, a CI/CD failure mode nothing
               currently watches (Phase 0 above already covers a red main and stale/failing PRs —
               this is for other gaps, e.g. deploy.yml or CodeQL failures going unwatched), an
               unaddressed dependency/security finding, or a thin Phase A backlog. Skip any gap
               already covered by one of the currently-open gap-analysis
               proposals listed above. File exactly 1 well-specified claude-task issue (via
               `gh issue create`) proposing a concrete solution — match the structure of
               `.github/ISSUE_TEMPLATE/claude-task.yml` (Goal / Context / Spec & acceptance
               criteria / Files likely touched / Out of scope / Verification / Explicit
               authorizations / Dependencies) and size it the same way a human-authored task issue
               would be sized (small enough for one run's budget, or explicitly split with
               "Blocked by #N" if it's bigger). Do NOT implement the fix yourself in this run —
               this task only proposes, it never opens a PR. Label the new issue with both
               `claude-task` and `gap-analysis`; ensure the `gap-analysis` label exists first
               (idempotent: `gh label create gap-analysis --color 0e8a16 --description
               "Proposal filed by a gap-analysis run" --force`).

            Hard constraints, no exceptions:
            - Never add, remove, or reorder entries in TIER_DEFINITIONS (src/game/layers.js), and
              never make game-design/economy-rule changes, UNLESS you are implementing a Phase A
              task issue whose "Explicit authorizations" section explicitly permits that specific
              change — a claude-task issue is the maintainer's written sign-off. During Phase B
              menu runs (and Phase 0 heal-main fixes) this ban is absolute.
            - Never modify .github/workflows/ci.yml, deploy.yml, autonomous-pr-followup.yml,
              or pr-auto-merge.yml.
            - Never change the dev/test server host binding away from 127.0.0.1.
            - Never use `--no-verify`, never skip or delete a failing test to make it pass, never
              force-push, and never push directly to main.
            - Never push your own commits to a `dependabot/*` branch — Dependabot owns that
              branch's content; the only allowed interaction is the `@dependabot rebase` comment
              described in Phase 0(b).
            - If a change touches anything CLAUDE.md documents (function signatures, constants,
              state shape, economy/game-rule behavior, file layout, or test counts), update
              CLAUDE.md in the same commit, per CLAUDE.md's own Documentation section.
            - Run `yarn test` (and `yarn build` if you touched dependencies) and confirm it is green
              before doing anything else.

            If, after all three phases, there is nothing safe and meaningful to do this run (no CI/CD
            failure, no eligible task issue, and no menu task worth doing), make no changes and end
            without creating a branch or PR — do not force a change just to have something to show.

            If you do make a code change: create a branch named `claude/heal-main-<short-slug>` for a
            Phase 0(a) fix, `claude/auto-task-<number>-<short-slug>` for a Phase A task, or
            `claude/auto-<short-task-slug>` for a Phase B menu task, commit, push it, and open a pull
            request against main using `gh pr create`. Structure the PR body to match
            .github/pull_request_template.md (Summary / Test plan / Documentation sections), filling
            in the checkboxes truthfully based on what you actually ran — and for a Phase A task,
            include the `Closes #<number>` line (or `Part of #<number>` for a partial slice, per the
            budget guidance above). The two exceptions are Phase 0(b)'s Dependabot rebase request
            (a comment, not a branch or PR) and Phase B item 6 (gap analysis), whose output is a filed
            issue, not a branch or PR.

      - name: Classify Claude step failure
        # Companion to the continue-on-error above: keep every real failure red, but treat
        # a run that died on turn 1 because the Claude subscription's usage quota was
        # exhausted (429 "session limit") as a skipped run — it made no changes, cost no
        # quota, and the next scheduled run (every 5 hours) retries automatically.
        if: steps.guard.outputs.skip != 'true' && steps.claude.outcome == 'failure'
        run: |
          out="${{ steps.claude.outputs.execution_file }}"
          [ -n "$out" ] && [ -f "$out" ] || out="$RUNNER_TEMP/claude-execution-output.json"
          if [ -f "$out" ] && jq -e '
                (if type == "array" then . else [.] end)
                | map(select(.type == "result"))
                | last
                | .is_error == true and .api_error_status == 429
              ' "$out" >/dev/null 2>&1; then
            echo "::warning::Run skipped: Claude usage limit hit (HTTP 429) before any work was done. The next scheduled run will retry."
            exit 0
          fi
          echo "::error::Claude run failed for a reason other than usage-quota exhaustion — see the 'Run autonomous maintenance task' step logs."
          exit 1

      - name: Fail on denied file modifications
        # The inverse blind spot of the step above: the action step can exit 0 while the
        # run inside it failed to do its job. Concretely: three consecutive green runs each
        # picked task #78, had every Write into .claude/skills//.claude/agents/ refused by
        # the harness's unattended-session guardrail, and ended "successfully" having only
        # left an issue comment — silently, with no signal a human would ever see without
        # reading the transcript. Bash denials are NOT treated as failures: allowlist misses
        # (python3, mkdir, multi-line gh commands) are routine and the agent works around
        # them.
        #
        # Exception: if the run itself already ran `gh issue edit <n> --add-label blocked`
        # in response to the denial — the exact recovery Phase A's guidance asks for — the
        # denial was properly diagnosed and hand-delivered to a human via the issue itself
        # (comment + label), not silently swallowed like #78 was. That issue comment is
        # already a durable, actionable signal on its own; a red job on top of it doesn't add
        # anything a human would act on differently, and the label already keeps future runs
        # from repeating it (see the guard step's Phase A exclusion). Confirmed for real via
        # #79: a run hit the same .claude/ restriction, correctly labeled it blocked, and the
        # job still went red for a task that was, from the run's own perspective, handled
        # exactly as instructed — see docs/DESIGN_HISTORY.md.
        if: steps.guard.outputs.skip != 'true' && steps.claude.outcome == 'success'
        run: |
          out="${{ steps.claude.outputs.execution_file }}"
          [ -n "$out" ] && [ -f "$out" ] || out="$RUNNER_TEMP/claude-execution-output.json"
          [ -f "$out" ] || { echo "No execution output found; nothing to check."; exit 0; }
          denied=$(jq -r '
                (if type == "array" then . else [.] end)
                | map(select(.type == "result")) | last
                | .permission_denials // []
                | map(select(.tool_name == "Write" or .tool_name == "Edit" or .tool_name == "NotebookEdit"))
                | .[] | "\(.tool_name): \(.tool_input.file_path // "(unknown path)")"
              ' "$out")
          if [ -z "$denied" ]; then
            echo "No denied file modifications."
            exit 0
          fi
          echo "::warning::The Claude run was denied one or more file modifications:"
          echo "$denied"
          labeled_blocked=$(jq -r '
                [.. | objects | select(has("command")) | .command // empty]
                | any(test("add-label\\s+blocked"))
              ' "$out")
          if [ "$labeled_blocked" = "true" ]; then
            echo "The run labeled the affected issue 'blocked' in response — properly diagnosed and handed off to a human, not silently swallowed. Job stays green."
            exit 0
          fi
          echo "::error::...and did not label the affected issue 'blocked' to hand it off — could not fully do its work with no durable signal left behind:"
          echo "$denied"
          echo "::error::If this was a task issue that needs a path an unattended run can't write (e.g. .claude/skills/), label the issue 'blocked' so future runs skip it, and handle it interactively."
          exit 1
